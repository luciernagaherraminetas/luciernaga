<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Preview del Álbum</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
}
.galeria{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}
img{
  width:100%;
  border-radius:8px;
}
a{
  color:#22c55e;
  display:inline-block;
  margin:15px;
}
</style>
</head>

<body>

<a href="/admin/albums">⬅ Volver a álbumes</a>

<div class="galeria">
{% for foto in fotos %}
  <img src="{{ url_for('static', filename='fotos_evento/' ~ carpeta ~ '/preview/' ~ foto) }}">
{% endfor %}
</div>

</body>
</html>
