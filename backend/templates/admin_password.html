<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar contraseña</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background:#020617;
    font-family:Arial;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:#e5e7eb;
}

form {
    background:#020617;
    padding:30px;
    border-radius:10px;
    width:340px;
    border:1px solid #1e293b;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#020617;
    border:1px solid #1e293b;
    color:#e5e7eb;
    border-radius:6px;
}

button {
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.error {
    color:#ef4444;
    margin-bottom:10px;
    text-align:center;
}
</style>
</head>

<body>

<form method="POST">
    <h2 style="text-align:center;">🔑 Cambiar contraseña</h2>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <input type="password" name="actual" placeholder="Contraseña actual" required>
    <input type="password" name="nueva" placeholder="Nueva contraseña" required>
    <input type="password" name="confirmar" placeholder="Confirmar nueva contraseña" required>

    <button type="submit">Guardar</button>

    <div style="margin-top:15px;text-align:center;">
        <a href="/admin" style="color:#94a3b8;">← Volver al admin</a>
    </div>
</form>

</body>
</html>
